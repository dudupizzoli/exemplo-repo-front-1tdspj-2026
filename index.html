<!DOCTYPE html>
<!-- DTD é o Document Type Definition e informa para o navegador a versão do html que está sendo carregada. Assim o navegador pode carregar um conjunto de biliotecas de acordo com a versão específica. --> 


<!-- Atributos:
os atributos são do tipo chave = valor. Exemplo: lang="pt-BR". Isso é um atributo que pode ir em qualquer tag de conteúdo.-->

<html lang="pt-BR"> ... </html>



<html lang="pt-br">
	<head>

	  </div>
